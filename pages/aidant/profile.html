<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Profil de Patient</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="profile.css">
    <script src="../../components/mc-navbar.js" defer></script>
</head>
<body class="aidant-body">

<mc-navbar active="profile" dir="aidant"></mc-navbar>

<main class="profile-container">
    <header class="profile-header">
        <h1 class="profile-title">Configuration de <span id="patient-name">Marcel</span></h1>
        <p class="profile-subtitle">Ajustez les paramètres de jeu et d'accessibilité.</p>
    </header>

    <section class="question-card">
        <div class="card-header">
            <span class="question-number">1</span>
            <h3 class="question-label">Niveau de difficulté</h3>
        </div>

        <div class="chips-group">
            <button class="chip active" onclick="setPreset('facile', this)">Facile</button>
            <button class="chip" onclick="setPreset('moyen', this)">Moyen</button>
            <button class="chip" onclick="setPreset('difficile', this)">Difficile</button>
            <button class="chip" onclick="setPreset('custom', this)">Personnalisé</button>
        </div>

        <div id="preset-summary" class="preset-info-box">
        </div>

        <div id="custom-controls" class="custom-panel" style="display: none;">
            <div class="input-row">
                <label>Nombre de questions</label>
                <div class="counter">
                    <button type="button" onclick="changeValue('questions', -1)">−</button>
                    <input type="number" id="questions" value="10" readonly>
                    <button type="button" onclick="changeValue('questions', 1)">+</button>
                </div>
            </div>

            <div class="input-row">
                <label>Réponses par question</label>
                <div class="counter">
                    <button type="button" onclick="changeValue('reponses', -1)">−</button>
                    <input type="number" id="reponses" value="3" readonly>
                    <button type="button" onclick="changeValue('reponses', 1)">+</button>
                </div>
            </div>

            <div class="input-row">
                <label>Inclure des images</label>
                <label class="switch">
                    <input type="checkbox" id="img-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="input-row">
                <label>Délai avant indice (sec.)</label>
                <input type="number" id="duration" class="small-number-input" value="10">
            </div>
        </div>
    </section>

    <section class="question-card">
        <div class="card-header">
            <span class="question-number">2</span>
            <h3 class="question-label">Accessibilité visuelle</h3>
        </div>

        <div class="input-group-vertical">
            <label class="sub-label">Taille du texte</label>
            <div class="chips-group">
                <button class="chip" onclick="updateFontSize('16px', this)">Petit</button>
                <button class="chip active" onclick="updateFontSize('20px', this)">Moyen</button>
                <button class="chip" onclick="updateFontSize('28px', this)">Grand</button>
            </div>
            <div id="preview-box" class="preview-area">
                Aperçu du texte pour le patient
            </div>
        </div>

        <div class="input-row">
            <label class="sub-label">Mode contraste élevé</label>
            <label class="switch">
                <input type="checkbox" id="contrast-toggle" onchange="toggleContrast()">
                <span class="slider"></span>
            </label>
        </div>
    </section>

    <button class="btn-save" onclick="saveSettings()">Enregistrer le profil</button>
</main>

<script src="profile.js"></script>
</body>
</html>
