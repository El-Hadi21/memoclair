<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Tableau de bord</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="../../components/mc-navbar.js" defer></script>
    <script src="../../components/mc-stat-card.js" defer></script>
</head>
<body class="aidant-body">

<mc-navbar active="dashboard" dir="aidant"></mc-navbar>

<main class="dashboard-container">

    <header class="dashboard-header">
        <h1 class="dashboard-title">Bonjour, Nathalie</h1>
        <p class="dashboard-subtitle">Voici le résumé de l'activité de Marcel cette semaine.</p>
    </header>

    <section class="dashboard-grid">

        <mc-stat-card
            icon="⏱️"
            card-title="Temps de jeu"
            value="50 min"
            trend="+15% par rapport à la semaine dernière"
            trend-type="positive">
        </mc-stat-card>

        <mc-stat-card
            icon="🎮"
            card-title="Jeu préféré"
            value="Mémoire"
            trend="5 sessions cette semaine">
        </mc-stat-card>

        <article class="action-card">
            <h3 class="action-card__title">Personnalisation</h3>
            <p class="action-card__text">
                Ajoutez des photos de famille pour enrichir le jeu Mémoire &amp; Réminiscence.
            </p>
            <a href="media.html" class="btn-primary">Ajouter des médias</a>
        </article>

    </section>

</main>

</body>
</html>
