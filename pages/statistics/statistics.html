<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Suivi Clinique</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="statistics.css">
</head>
<body class="stats-body">

<header class="stats-header">
    <a href="../index/index.html" class="btn-back">
        <span aria-hidden="true">⬅️</span> Accueil
    </a>
    <h1 class="main-title">Suivi par Session</h1>

    <div class="patient-selector">
        <label for="patient-select">Dossier de :</label>
        <select id="patient-select">
            <option value="marcel">Marcel (Stade Avancé)</option>
            <option value="jean">Jean (Stade Modéré)</option>
            <option value="paul">Paul (Stade Léger)</option>
        </select>
    </div>
</header>

<main class="stats-container">
    <aside class="sessions-sidebar">
        <h2>Historique des Sessions</h2>
        <div id="sessions-list" class="sessions-list">
        </div>
    </aside>

    <section class="session-details">
        <h2 id="session-title">Sélectionnez une session</h2>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Durée de jeu</h3>
                <p id="metric-duration" class="metric-value">-- min</p>
            </div>
            <div class="metric-card">
                <h3>Jeux utilisés</h3>
                <p id="metric-games" class="metric-value">--</p>
            </div>
            <div class="metric-card">
                <h3>État d'anxiété</h3>
                <p id="metric-anxiety" class="metric-value">--</p>
            </div>
        </div>

        <div class="attention-graph-container">
            <h3>Évolution de l'attention (Graphe de session)</h3>
            <div class="css-graph">
                <div class="bar-container"><div class="bar" id="bar-start"></div><span>Début</span></div>
                <div class="bar-container"><div class="bar" id="bar-mid"></div><span>Milieu</span></div>
                <div class="bar-container"><div class="bar" id="bar-end"></div><span>Fin</span></div>
            </div>
            <p id="attention-comment" class="graph-comment">--</p>
        </div>
    </section>
</main>

<script src="statistics.js"></script>
</body>
</html>
