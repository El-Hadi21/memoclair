<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Espace Jeux</title>
    <script src="../../scripts/settings-apply.js"></script>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="games.css">
    <script src="../../components/mc-game-card.js" defer></script>
</head>
<body>

<main class="games-container">

    <header class="games-header">
        <a href="../index/index.html" class="btn-back" aria-label="Retour à l'accueil">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Retour
        </a>
        <h1 class="games-title">À quoi voulez-vous jouer ?</h1>
        <!-- Bouton paramètres accessibilité -->
        <a href="../settings/settings.html" class="btn-settings" aria-label="Paramètres d'affichage"
           id="btn-settings">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </a>
    </header>

    <section class="games-list">

        <!-- Carte A : Associations du Quotidien -->
        <mc-game-card
            card-title="Associations du Quotidien"
            desc="Retrouvez les objets qui vont ensemble."
            href="game-a.html"
            icon-type="associations">
        </mc-game-card>

        <!-- Carte B : Mémoire & Réminiscence -->
        <mc-game-card
            card-title="Mémoire &amp; Réminiscence"
            desc="Reconnaissez vos proches et vos souvenirs."
            href="game-b.html"
            icon-type="memoire"
            duo>
        </mc-game-card>

    </section>

</main>

<script src="games.js"></script>
</body>
</html>
