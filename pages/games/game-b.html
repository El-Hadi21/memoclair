<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Mémoire &amp; Réminiscence</title>
    <script src="../../scripts/settings-apply.js"></script>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="game-b.css">
</head>
<body>

<main class="game-container">

    <header class="game-header">
        <a href="games.html" class="btn-back" aria-label="Retour aux jeux">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Retour
        </a>
        <h1 class="game-title">Mémoire &amp; Réminiscence</h1>
    </header>

    <div class="photo-frame" role="img" aria-label="Photo personnelle">
        <svg viewBox="0 0 280 240" aria-hidden="true">
            <rect width="280" height="240" rx="16" fill="#EEF5EF"/>
            <circle cx="240" cy="48" r="32" fill="#FAD07A" opacity="0.7"/>
            <circle cx="140" cy="90" r="44" fill="#D4A96A"/>
            <path d="M72 240 Q72 170 140 162 Q208 170 208 240 Z" fill="#A8C4A2"/>
            <path d="M118 162 Q140 178 162 162" fill="none" stroke="#6B8F71" stroke-width="4" stroke-linecap="round"/>
            <text x="140" y="228" text-anchor="middle" font-size="14" fill="#9CA3AF" font-family="Inter, sans-serif">
                Photo personnelle
            </text>
        </svg>
    </div>

    <p class="game-question">Qui est cette personne ?</p>

    <section class="choices" aria-label="Choisissez la bonne réponse">
        <button class="choice-btn choice-btn--correct" data-correct="true">Nathalie, ma femme</button>
        <button class="choice-btn" data-correct="false">Hélène, ma sœur</button>
    </section>

    <div class="feedback" id="feedback" aria-live="polite" hidden></div>

</main>

<script src="game-b.js"></script>
</body>
</html>
