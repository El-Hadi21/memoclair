<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Associations du Quotidien</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="game-a.css">
</head>
<body>

<main class="game-container">

    <header class="game-header">
        <a href="game-a-start.html" class="btn-back">
            <span aria-hidden="true">⬅️</span> Retour
        </a>
        <h1 class="game-title">Associations du Quotidien</h1>
    </header>

    <div class="centered-play-zone">

        <p class="game-patient-status" id="patient-status"></p>
        <p class="game-instruction" id="game-instruction">Chargement...</p>

        <div class="central-image-frame" role="img" aria-label="Une tasse de café">
            <img src="../../assets/pictuers/game_daily/consigne_tasse.png" alt="Une tasse de café">
        </div>

        <section class="choices" id="choices-container" aria-label="Choisissez la bonne réponse"></section>
    </div>

    <div class="feedback" id="feedback" aria-live="polite" hidden></div>

</main>

<script src="game-a.js"></script>
</body>
</html>
