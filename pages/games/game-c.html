<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoClair - Proverbes à Compléter</title>
    <script src="../../scripts/settings-apply.js"></script>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="game-c.css">
</head>
<body>

<main class="game-container">

    <!-- En-tête -->
    <header class="game-header">
        <a href="games.html" class="btn-back" aria-label="Retour aux jeux">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Retour
        </a>
        <h1 class="game-title">Proverbes à Compléter</h1>
    </header>

    <!-- Compteur de question (discret, pour l'aidant) -->
    <p class="question-counter" id="question-counter" aria-live="polite">Question 1 sur 5</p>

    <!-- Carte du proverbe -->
    <div class="proverb-card" role="region" aria-label="Proverbe à compléter">
        <span class="proverb-card__quote" aria-hidden="true">❝</span>
        <p class="proverb-card__text" id="proverb-text">
            Mieux vaut tard que…
        </p>
    </div>

    <!-- Choix de réponse (texte) -->
    <section class="choices" aria-label="Choisissez la fin du proverbe">
        <button class="choice-btn" data-index="0"></button>
        <button class="choice-btn" data-index="1"></button>
        <button class="choice-btn" data-index="2"></button>
    </section>

    <!-- Feedback -->
    <div class="feedback" id="feedback" aria-live="polite" hidden></div>

    <!-- Bouton Passer -->
    <div class="skip-wrap">
        <button class="btn-passer" id="btn-passer">Passer</button>
    </div>

</main>

<script src="game-c.js"></script>
</body>
</html>
